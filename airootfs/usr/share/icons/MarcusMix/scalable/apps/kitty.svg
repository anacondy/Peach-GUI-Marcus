<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="7" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#504945"/>
      <stop offset="1" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2021"/>
      <stop offset="1" stop-color="#0d0e0e"/>
    </linearGradient>
    <linearGradient id="stand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#665c54"/>
      <stop offset="1" stop-color="#3c3836"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.3" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bezelClip">
      <rect x="34" y="46" width="188" height="134" rx="24"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <!-- stand/foot: what breaks the pure rounded-rect silhouette -->
    <path d="M 108 176 L 148 176 L 162 210 L 94 210 Z" fill="url(#stand)"/>
    <rect x="78" y="208" width="100" height="14" rx="7" fill="#3c3836"/>

    <!-- monitor bezel -->
    <rect x="34" y="46" width="188" height="134" rx="24" fill="url(#bezel)"/>
    <rect x="34" y="46" width="188" height="134" rx="24" fill="url(#gloss)" clip-path="url(#bezelClip)"/>

    <!-- screen -->
    <rect x="50" y="62" width="156" height="102" rx="10" fill="url(#screen)"/>

    <!-- prompt glyph, glowing -->
    <g filter="url(#glow)">
      <path d="M 68 92 L 90 113 L 68 134" fill="none" stroke="#8ec07c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="100" y="126" width="34" height="7" rx="3.5" fill="#fabd2f"/>
    </g>
  </g>
</svg>
